# Alembic 主配置文件
# 核心作用：定义迁移脚本路径、数据库连接、日志规则等全局配置

[alembic]
# ===================== Alembic 核心配置 =====================
# 1. 迁移脚本存放目录（默认生成的 migrations 文件夹）
script_location = migrations
# 2. 将当前目录加入 Python 搜索路径（解决模块导入问题）
prepend_sys_path = .
# 3. 版本文件路径分隔符（os 表示自动适配 Windows(\) / Linux(/)）
version_path_separator = os
# 4. 迁移脚本的模板文件（默认使用 migrations/script.py.mako，无需修改）
script.py.mako = migrations/script.py.mako
# 5. 是否在生成迁移时跳过空迁移（无模型变更时不生成版本文件）
skip_generic_attributes = false
# 6. 编码格式（适配中文，避免迁移注释乱码）
file_encoding = utf-8

# ===================== 数据库连接配置 =====================
[sqlalchemy]
# 数据库连接 URL（会被 env.py 中的项目配置覆盖，此处仅作默认值）
# SQLite 路径：适配项目 backend/data/wardrobe.db
url = sqlite:///C:/Users/23708/Desktop/smart-wardrobe-system-test/backend/data/wardrobe.db

# ===================== 日志配置 =====================
# 日志器列表（root=根日志器，alembic=专属日志器）
[loggers]
keys = root, alembic

# 日志处理器列表（console=控制台输出）
[handlers]
keys = console

# 日志格式器列表（generic=通用格式）
[formatters]
keys = generic

# 根日志器配置（全局日志级别）
[logger_root]
level = WARN  # 日志级别：DEBUG < INFO < WARN < ERROR < CRITICAL
handlers = console  # 绑定控制台处理器
qualname =  # 日志器名称（空=根日志器）

# Alembic 专属日志器（控制迁移相关日志）
[logger_alembic]
level = INFO  # 迁移日志级别（INFO 能看到关键步骤，DEBUG 会输出所有 SQL）
handlers = console
qualname = alembic  # 日志器名称，对应 alembic 模块
propagate = 0  # 不向上传播日志（避免重复输出）

# 控制台处理器配置（日志输出到终端）
[handler_console]
class = StreamHandler  # 处理器类型：输出到标准输出（终端）
args = (sys.stdout,)  # 输出目标：标准输出
level = NOTSET  # 不限制级别（继承日志器的级别）
formatter = generic  # 使用 generic 格式器

# 通用日志格式器（控制日志输出样式）
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(asctime)s %(message)s  # 格式：级别 [日志器] 时间 内容
datefmt = %Y-%m-%d %H:%M:%S  # 时间格式：年-月-日 时:分:秒
class = logging.Formatter  # 格式器类型